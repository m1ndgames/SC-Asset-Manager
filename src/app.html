<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Primary meta -->
    <title>S.C.A.M — Star Citizen Asset Manager</title>
    <meta name="description" content="A free, browser-based commodity tracker for Star Citizen. Log assets, record trades, track P&L, sync with your org via Firebase or PocketBase, and push orders to UEX Corp." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="S.C.A.M — Star Citizen Asset Manager" />
    <meta property="og:description" content="A free, browser-based commodity tracker for Star Citizen. Log assets, record trades, track P&L, sync with your org, and push orders to UEX Corp." />
    <meta property="og:site_name" content="S.C.A.M" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="S.C.A.M — Star Citizen Asset Manager" />
    <meta name="twitter:description" content="A free, browser-based commodity tracker for Star Citizen. Log assets, record trades, track P&L, sync with your org, and push orders to UEX Corp." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
